name: Public Demo Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  public-demo:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run public demo gates
        run: python scripts/run_public_demo_checks.py
