name: Public Demo Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  public-demo:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run release docs gate
        run: python3 scripts/satlab.py release check --docs --no-write
      - name: Run public demo test gate
        run: python3 scripts/satlab.py release check --tests --timeout 420 --no-write
